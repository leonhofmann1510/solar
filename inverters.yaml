# Inverter Modbus register configuration
#
# Each inverter entry defines its connection settings and the absolute
# register addresses for every data point — no offsets, no base math.
#
# Register type is detected automatically by address (default behaviour):
#   address >= 10000  →  Input register   (read_input_registers / FC4)
#   address <  10000  →  Holding register (read_holding_registers / FC3)
#
# Override with low_addr_as_holding: false to force FC4 for all addresses
# (needed for SG-series inverters where 5xxx are input registers).
#
# All raw values are divided by 10 (Sungrow stores in 0.1 units), except
# battery_power which is in 10W units and uses battery_running_state for direction.
#
# Set battery_power / battery_soc / grid_frequency to null when not present.

inverters:
  - id: inv1
    ip: 192.168.178.24
    port: 502
    unit_id: 1
    has_battery: true
    low_addr_as_holding: false  # SH10RT: all registers are input (FC4)
    registers:
      pv_yield_today:  13002
      pv_power:        null   # calculated from MPPT strings (V*A)
      grid_power:      13009
      pv_u1:           5010
      pv_i1:           5011
      pv_u2:           5012
      pv_i2:           5013
      battery_soc:            13022  # SOC in %
      battery_power:          null   # computed from battery_voltage × battery_current
      battery_voltage:        13019  # battery voltage ×0.1 V
      battery_current:        13025  # battery current ×0.1 A
      battery_running_state:  13006  # 0=standby, 1=charging, 2=discharging — confirmed from register dump
      grid_buy_today:  13035
      feed_in_today:   13044
      inverter_temp:   13008
      grid_frequency:  null

  - id: inv2
    ip: 192.168.178.26
    port: 502
    unit_id: 1
    has_battery: false
    low_addr_as_holding: false  # SG series: all registers are input (FC4 / read_input_registers)
    registers:
      pv_yield_today:  5002
      pv_yield_total:  5003
      pv_power:        null   # calculated from MPPT strings (V*A)
      grid_power:      null
      pv_u1:           5010
      pv_i1:           5011
      pv_u2:           5012
      pv_i2:           5013
      battery_power:   null    
      battery_soc:     null    
      grid_buy_today:  null    
      feed_in_today:   null    
      grid_frequency:  5035    
      inverter_temp:   5007